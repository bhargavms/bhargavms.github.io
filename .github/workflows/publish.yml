name: Publish mogra-site image

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'proxy/**'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/bhargavms/mogra-site:${{ github.sha }}
            ghcr.io/bhargavms/mogra-site:3.2.0
            ghcr.io/bhargavms/mogra-site:latest
