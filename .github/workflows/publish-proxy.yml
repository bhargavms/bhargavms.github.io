name: Publish mogra-proxy image

on:
  push:
    branches:
      - main
    paths:
      - 'proxy/**'
      - '.github/workflows/publish-proxy.yml'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./proxy
          file: ./proxy/Dockerfile
          push: true
          tags: |
            ghcr.io/bhargavms/mogra-proxy:${{ github.sha }}
            ghcr.io/bhargavms/mogra-proxy:1.1.0
            ghcr.io/bhargavms/mogra-proxy:latest
