server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Behind Cloudflare/ingress on a different port: emit relative redirects so
    # nginx's internal listen port (8080) never leaks into Location headers
    # (e.g. /homelab -> /homelab/ would otherwise redirect to host:8080).
    absolute_redirect off;
    port_in_redirect off;
    server_name_in_redirect off;

    # Proxy live API requests to the in-cluster Go caching service.
    location /api/ {
        resolver kube-dns.kube-system.svc.cluster.local valid=30s ipv6=off;
        set $proxy_upstream http://mogra-proxy.mogra.svc.cluster.local:8080;
        proxy_pass $proxy_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }
}
