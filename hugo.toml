baseURL = 'https://mogra.dev/'
defaultContentLanguage = 'en'
title = 'Bhargav Mogra'
enableRobotsTXT = true
enableGitInfo = false

[pagination]
  pagerSize = 10

[taxonomies]
  tag = 'tags'

[outputs]
  home = ['HTML', 'RSS']
  section = ['HTML', 'RSS']

[params]
  description = 'Android developer and infrastructure engineer building reliable mobile platforms.'
  author = 'Bhargav Mogra'
  email = 'bhargav521@gmail.com'
  location = 'Bangkok, Thailand'
  github = 'bhargavms'
  linkedin = 'bhargavmogra'
  medium = 'rituel521'
  stackoverflow = '4128945'
